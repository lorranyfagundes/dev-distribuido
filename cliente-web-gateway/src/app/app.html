<div style="padding: 2rem; max-width: 900px; margin: auto;">
  <h2 style="font-family: sans-serif;">Gerenciamento de Itens</h2>
  
  <p-button label="Novo Item" icon="pi pi-plus" (click)="abrirNovo()" styleClass="mb-3"></p-button>

  <p-table [value]="itens" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Valor</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>{{ item.nome }}</td>
        <td>{{ item.valor | currency:'BRL' }}</td>
        <td>
          <p-tag [severity]="item.disponivel ? 'success' : 'danger'" [value]="item.disponivel ? 'Disponivel' : 'Indisponivel'"></p-tag>
        </td>
        <td>
          <p-button 
              icon="pi pi-trash" 
              severity="danger" 
              [rounded]="true" 
              label="Remover"
              (click)="excluir(item.id)">
          </p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog header="Detalhes do Item" [(visible)]="exibirModal" [modal]="true" [style]="{ width: '25rem' }">
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <label>Nome (String)</label>
      <input pInputText [(ngModel)]="itemSelecionado.nome" />

      <label>Valor (Number)</label>
      <p-inputNumber [(ngModel)]="itemSelecionado.valor" mode="currency" currency="BRL" locale="pt-BR"></p-inputNumber>

      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <p-checkbox [(ngModel)]="itemSelecionado.disponivel" [binary]="true"></p-checkbox>
        <label>Disponivel? (Boolean)</label>
      </div>

      <p-button label="Salvar" (click)="salvar()"></p-button>
    </div>
  </p-dialog>
</div>
